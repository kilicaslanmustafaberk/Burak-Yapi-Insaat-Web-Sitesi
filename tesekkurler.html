    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="styles.css" />

    <style>
      .thankyou-section {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 120px 5% 80px;
        position: relative;
        overflow: hidden;
        background: linear-gradient(rgba(10, 25, 47, 0.4), rgba(10, 25, 47, 0.7));
      }
      .hero-video {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: -1;
      }
      .thankyou-card {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 180, 0, 0.15);
        border-radius: 16px;
        padding: 60px 48px;
        text-align: center;
        max-width: 560px;
        width: 100%;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        animation: fadeInUp 0.8s ease;
      }
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .thankyou-icon {
        margin-bottom: 24px;
      }
      .thankyou-icon i {
        font-size: 4rem;
        color: var(--secondary);
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.08); }
      }
      .thankyou-title {
        font-size: clamp(1.6rem, 4vw, 2.2rem);
        font-weight: 800;
        color: var(--white);
        margin-bottom: 16px;
        line-height: 1.2;
      }
      .thankyou-desc {
        font-size: 1rem;
        color: var(--text-sub);
        line-height: 1.7;
        margin-bottom: 36px;
      }
      .thankyou-actions {
        display: flex;
        flex-direction: column;
        gap: 14px;
        align-items: center;
      }
      .ty-btn {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 16px 32px;
        border-radius: 6px;
        font-weight: 700;
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: all 0.3s ease;
        border: none;
        cursor: pointer;
        text-decoration: none;
        font-family: "Plus Jakarta Sans", sans-serif;
        width: 100%;
        max-width: 320px;
        justify-content: center;
      }
      .ty-btn-whatsapp {
        background: linear-gradient(135deg, #25D366, #128C7E);
        color: var(--white);
        box-shadow: 0 6px 24px rgba(37, 211, 102, 0.3);
      }
      .ty-btn-whatsapp:hover {
        box-shadow: 0 10px 36px rgba(37, 211, 102, 0.5);
        transform: translateY(-3px);
      }
      .ty-btn-home {
        background: rgba(255, 255, 255, 0.04);
        color: var(--white);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .ty-btn-home:hover {
        background: rgba(255, 255, 255, 0.08);
        transform: translateY(-3px);
      }
      @media (max-width: 480px) {
        .thankyou-card { padding: 40px 24px; }
      }
    </style>
  </head>
  <body>
    <div id="navbar-placeholder"></div>

    <main>
      <section class="thankyou-section">
        <video autoplay muted loop playsinline class="hero-video">
          <source src="assets/videos/arkaplan.mp4" type="video/mp4" />
        </video>
        <div class="thankyou-card">
          <div class="thankyou-icon">
            <i class="fas fa-check-circle"></i>
          </div>
          <h1 class="thankyou-title">Talebiniz Başarıyla Alındı!</h1>
          <p class="thankyou-desc">
            Ekibimiz en kısa sürede sizinle iletişime geçecektir.
            WhatsApp üzerinden de bize ulaşabilirsiniz.
          </p>
          <div class="thankyou-actions">
            <a href="https://wa.me/905364481906" target="_blank" rel="noopener noreferrer" class="ty-btn ty-btn-whatsapp">
              <i class="fab fa-whatsapp"></i>
              WhatsApp ile Ulaşın
            </a>
            <a href="index.html" class="ty-btn ty-btn-home">
              <i class="fas fa-home"></i>
              Ana Sayfaya Dön
            </a>
          </div>
        </div>
      </section>
    </main>

    <div id="footer-placeholder"></div>
    <div id="whatsapp-placeholder"></div>
    <div id="modal-placeholder"></div>

    <script src="components.js"></script>
    <script>initComponents('tesekkurler');</script>
  </body>
</html>
